<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkit Style Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Header -->
    <header class="bg-yellow-400 p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-black tracking-tight">QuickStore</h1>
            <div class="text-right">
                <p class="text-[10px] font-bold bg-black text-white px-2 py-0.5 rounded">FAST DELIVERY</p>
            </div>
        </div>
    </header>

    <!-- Product Section -->
    <main class="container mx-auto p-4 md:p-8">
        <h2 class="text-xl font-bold mb-6 text-gray-800">New Arrivals</h2>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            
            <!-- Product 1 -->
            <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                <div class="h-48 overflow-hidden rounded-lg bg-gray-50 mb-3">
                    <img src="https://i.ibb.co/BHY3Q6bq/SHIRT.jpg" alt="Premium Shirt" class="w-full h-full object-contain">
                </div>
                <h3 class="font-semibold text-sm text-gray-800 truncate">Premium Cotton Shirt</h3>
                <p class="text-green-700 font-bold text-lg">Rs. 1,200</p>
                <button onclick="openOrderModal('Premium Cotton Shirt', '1200')" class="mt-2 w-full border-2 border-green-600 text-green-600 font-bold py-1.5 rounded-lg hover:bg-green-600 hover:text-white transition text-sm">ADD</button>
            </div>

            <!-- Product 2 -->
            <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                <div class="h-48 overflow-hidden rounded-lg bg-gray-50 mb-3">
                    <img src="https://i.ibb.co/SXbGPmrp/shirt.jpg" alt="Casual Shirt" class="w-full h-full object-contain">
                </div>
                <h3 class="font-semibold text-sm text-gray-800 truncate">Casual Summer Shirt</h3>
                <p class="text-green-700 font-bold text-lg">Rs. 950</p>
                <button onclick="openOrderModal('Casual Summer Shirt', '950')" class="mt-2 w-full border-2 border-green-600 text-green-600 font-bold py-1.5 rounded-lg hover:bg-green-600 hover:text-white transition text-sm">ADD</button>
            </div>

        </div>
    </main>

    <!-- Simple Order Modal -->
    <div id="orderModal" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl">
            <h2 class="text-xl font-bold mb-1">Confirm Order</h2>
            <p id="selectedProductName" class="text-gray-500 text-sm mb-4 italic"></p>
            
            <!-- REMINDER: Replace YOUR_ENDPOINT_HERE with your Formspree ID -->
            <form action="https://formspree.io/f/YOUR_ENDPOINT_HERE" method="POST">
                <input type="hidden" name="Item" id="productInput">
                <input type="hidden" name="Price" id="priceInput">
                
                <div class="space-y-3">
                    <input type="text" name="name" placeholder="Full Name" required class="w-full border-2 border-gray-100 p-2.5 rounded-xl focus:border-yellow-400 outline-none">
                    <input type="tel" name="phone" placeholder="WhatsApp Number" required class="w-full border-2 border-gray-100 p-2.5 rounded-xl focus:border-yellow-400 outline-none">
                    <textarea name="address" placeholder="Full Address" required class="w-full border-2 border-gray-100 p-2.5 rounded-xl focus:border-yellow-400 outline-none h-24"></textarea>
                </div>
                
                <div class="flex gap-3 mt-6">
                    <button type="button" onclick="closeModal()" class="flex-1 text-gray-500 font-bold py-3">Back</button>
                    <button type="submit" class="flex-1 bg-yellow-400 hover:bg-yellow-500 text-black font-bold py-3 rounded-xl shadow-lg">Place Order</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openOrderModal(name, price) {
            document.getElementById('orderModal').classList.remove('hidden');
            document.getElementById('selectedProductName').innerText = "Ordering: " + name;
            document.getElementById('productInput').value = name;
            document.getElementById('priceInput').value = price;
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }
    </script>
</body>
</html>
